<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cockpit Projet SI</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; font-size: 13px; line-height: 1.5; }
    button { cursor: pointer; border: none; font-family: inherit; font-size: inherit; }
    input, select, textarea { font-family: inherit; font-size: 13px; }
    .hidden { display: none !important; }

    /* Header */
    .app-header { background: #fff; border-bottom: 3px solid #4f46e5; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .app-header-left { display: flex; align-items: center; gap: 12px; }
    .app-header-left .icon-circle { width: 44px; height: 44px; background: #eef2ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .app-header-left h1 { font-size: 19px; font-weight: 800; color: #312e81; }
    .app-header-left p { font-size: 12px; color: #64748b; }
    .app-header-right { display: flex; align-items: center; gap: 8px; }
    .lang-btn { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; background: #f1f5f9; color: #64748b; }
    .lang-btn.active { background: #4f46e5; color: #fff; }

    /* Tabs */
    .tabs { display: flex; gap: 6px; background: #fff; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
    .tab-btn { padding: 9px 14px; font-weight: 600; color: #64748b; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
    .tab-btn:hover { background: #eef2ff; color: #4f46e5; border-color: #c7d2fe; }
    .tab-btn.active { background: linear-gradient(135deg, #4f46e5, #4338ca); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(79,70,229,.3); }
    .tab-content { display: none; padding: 22px; }
    .tab-content.active { display: block; }

    /* Cards & sections */
    .section-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 18px; }
    .section-title { font-size: 16px; font-weight: 800; color: #312e81; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-subtitle { font-size: 12px; color: #64748b; font-weight: 500; }

    /* KPI grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .kpi-card { background: #fff; border-radius: 12px; padding: 16px 18px; border-left: 4px solid #4f46e5; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .kpi-card .kpi-value { font-size: 26px; font-weight: 900; color: #4f46e5; }
    .kpi-card .kpi-label { font-size: 12px; color: #64748b; margin-top: 2px; }
    .kpi-card.warn { border-left-color: #f59e0b; } .kpi-card.warn .kpi-value { color: #f59e0b; }
    .kpi-card.danger { border-left-color: #ef4444; } .kpi-card.danger .kpi-value { color: #ef4444; }
    .kpi-card.ok { border-left-color: #22c55e; } .kpi-card.ok .kpi-value { color: #22c55e; }

    /* Buttons */
    .btn { padding: 9px 16px; border-radius: 8px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
    .btn-primary { background: #4f46e5; color: #fff; } .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f1f5f9; color: #475569; } .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: #fff; color: #ef4444; border: 1px solid #ef4444; } .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { background: none; padding: 4px 8px; border-radius: 6px; font-size: 14px; } .btn-icon:hover { background: #f1f5f9; }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table thead { background: #312e81; color: #fff; }
    .data-table th { padding: 9px 8px; text-align: left; font-weight: 700; white-space: nowrap; }
    .data-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    .data-table tbody tr:hover { background: #eef2ff; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .badge-must { background: #fee2e2; color: #b91c1c; }
    .badge-should { background: #ffedd5; color: #c2410c; }
    .badge-could { background: #dbeafe; color: #1d4ed8; }
    .badge-wont { background: #f1f5f9; color: #64748b; }

    /* Toast */
    #toast-container { position: fixed; top: 18px; right: 18px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 11px 18px; border-radius: 10px; color: #fff; font-weight: 700; font-size: 13px; box-shadow: 0 6px 18px rgba(0,0,0,.18); animation: slideIn .25s ease; }
    .toast-success { background: #22c55e; } .toast-error { background: #ef4444; } .toast-info { background: #4f46e5; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; }
    .modal { background: #fff; border-radius: 14px; width: 100%; max-width: 640px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-header { background: linear-gradient(135deg, #4f46e5, #4338ca); color: #fff; padding: 16px 20px; border-radius: 14px 14px 0 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 16px; font-weight: 800; }
    .modal-close { background: rgba(255,255,255,.15); color: #fff; font-size: 18px; font-weight: 700; width: 30px; height: 30px; border-radius: 8px; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 10px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; transition: border-color .15s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; } .form-row .form-group { flex: 1; min-width: 160px; }

    .empty-hint { text-align: center; color: #94a3b8; padding: 40px 20px; }
    #not-in-grist { text-align: center; padding: 60px 20px; }
    #not-in-grist h2 { color: #4f46e5; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="not-in-grist" class="hidden">
    <h2>🚀 Cockpit Projet SI</h2>
    <p>Ce widget doit être ajouté dans un document Grist (accès « Complet »).</p>
  </div>

  <div id="main-content">
    <div class="app-header">
      <div class="app-header-left">
        <div class="icon-circle">🚀</div>
        <div>
          <h1 data-i18n="appTitle">Cockpit de pilotage projet SI</h1>
          <p data-i18n="appSubtitle">Pilotage exigences, risques, données, gouvernance, formation</p>
        </div>
      </div>
      <div class="app-header-right">
        <button class="btn btn-secondary btn-sm" onclick="exportCurrentExcel()" title="Export Excel">📊 Excel</button>
        <button class="btn btn-secondary btn-sm" onclick="exportCurrentViewPdf()" title="Export PDF">📄 PDF</button>
        <button class="lang-btn active" id="lang-fr" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 <span data-i18n="tabDashboard">Tableau de bord</span></button>
      <button class="tab-btn" data-tab="requirements" onclick="switchTab('requirements')">📋 <span data-i18n="tabRequirements">Exigences</span></button>
      <button class="tab-btn" data-tab="roadmap" onclick="switchTab('roadmap')">🗺️ <span data-i18n="tabRoadmap">Feuille de route</span></button>
      <button class="tab-btn" data-tab="risks" onclick="switchTab('risks')">⚠️ <span data-i18n="tabRisks">Risques</span></button>
      <button class="tab-btn" data-tab="governance" onclick="switchTab('governance')">👥 <span data-i18n="tabGovernance">RACI &amp; Gouvernance</span></button>
      <button class="tab-btn" data-tab="data" onclick="switchTab('data')">🧬 <span data-i18n="tabData">Qualité données</span></button>
      <button class="tab-btn" data-tab="training" onclick="switchTab('training')">🎓 <span data-i18n="tabTraining">Formation</span></button>
      <button class="tab-btn" data-tab="processes" onclick="switchTab('processes')">🔄 <span data-i18n="tabProcesses">Processus</span></button>
    </div>

    <div class="tab-content active" id="tab-dashboard"><div id="view-dashboard"></div></div>
    <div class="tab-content" id="tab-requirements"><div id="view-requirements"></div></div>
    <div class="tab-content" id="tab-roadmap"><div id="view-roadmap"></div></div>
    <div class="tab-content" id="tab-risks"><div id="view-risks"></div></div>
    <div class="tab-content" id="tab-governance"><div id="view-governance"></div></div>
    <div class="tab-content" id="tab-data"><div id="view-data"></div></div>
    <div class="tab-content" id="tab-training"><div id="view-training"></div></div>
    <div class="tab-content" id="tab-processes"><div id="view-processes"></div></div>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <script src="widget.js?v=3"></script>
</body>
</html>
